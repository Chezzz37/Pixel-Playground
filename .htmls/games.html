<!DOCTYPE html>
<html lang="en" >
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Game Site Template - Games</title>
     <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <link href="https://fonts.googleapis.com/css2?family=Audiowide&family=Black+Ops+One&family=Bungee&family=Bubblegum+Sans&family=Fredoka+One&family=Nosifer&display=swap" rel="stylesheet" />
    <style>
        @font-face {
            font-family: 'Pixelify Sans';
            src: url('https://files.florian-rappl.de/pixelify/Pixellari.ttf') format('truetype');
            font-weight: normal;
            font-style: normal;
        }
        body {
            font-family: 'Bungee', sans-serif;
            background-color: #000;
            color: #fff;
            margin: 0;
            padding-bottom: 60px;
            text-align: center;
            transition: color 0.3s, background-color 0.3s;
        }
        body.background-image-mode {
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            background-color: #000;
        }
        /* Buttons for the game list */
        #game-list button {
            margin: 8px 12px;
            padding: 12px 20px;
            font-family: inherit;
            font-size: 1.1rem;
            border-radius: 6px;
            border: 2px solid #FFA500;
            background-color: #FFA500;
            color: #000;
            cursor: pointer;
            user-select: none;
            transition: background-color 0.3s, color 0.3s;
            min-width: 150px;
        }
        #game-list button:hover {
            background-color: #000;
            color: #FFA500;
            border-color: #FFA500;
        }
        /* Container for game viewer */
        #game-viewer-container {
            display: none;
            margin: 20px auto;
            max-width: 1200px;
        }
        #game-frame {
    width: 958px;
    height: 489px;
    border: 3px solid #FFA500;
    border-radius: 8px;
    background-color: #000;
}

        /* Controls below the game iframe */
        #game-controls {
            margin-top: 10px;
            display: flex;
            justify-content: center;
            gap: 12px;
        }
        #game-controls button {
            padding: 10px 16px;
            border: 2px solid #FFA500;
            background-color: #FFA500;
            color: #000;
            cursor: pointer;
            border-radius: 6px;
            font-family: inherit;
            font-size: 1rem;
            user-select: none;
            transition: background-color 0.3s, color 0.3s;
            min-width: 130px;
        }
        #game-controls button:hover {
            background-color: #000;
            color: #FFA500;
            border-color: #FFA500;
        }
        /* Bottom nav bar */
        .bottom-nav {
            background-color: #000;
            position: fixed;
            bottom: 0;
            width: 100%;
            display: flex;
            justify-content: space-around;
            box-shadow: 0 -2px 10px rgba(255, 165, 0, 0.5);
            z-index: 1000;
        }
        .nav-item {
            padding: 14px;
            color: #FFA500;
            text-decoration: none;
            cursor: pointer;
            user-select: none;
            font-family: 'Bungee', sans-serif;
            font-size: 1.1rem;
        }
        .nav-item:hover {
            background-color: #FFA500;
            color: #000;
        }
    </style>
</head>
<body>
    <h1 style="color:#fff; user-select:none; margin-top:20px;">Game Selection</h1>
    <div id="game-list" aria-label="List of games" role="list">
        <button role="listitem" data-url="https://raw.githubusercontent.com/CoolDude2349/Offline-HTML-Games-Pack/master/offline/crazycars.html">Game 1</button>
        <button role="listitem" data-url="https://raw.githubusercontent.com/username/repo/main/game2/index.html">Game 2</button>
        <button role="listitem" data-url="https://raw.githubusercontent.com/username/repo/main/game3/index.html">Game 3</button>
        <button role="listitem" data-url="https://raw.githubusercontent.com/username/repo/main/game4/index.html">Game 4</button>
        <!-- Add more games here with real raw github URLs -->
    </div>

    <div id="game-viewer-container" aria-label="Game viewer">
        <iframe id="game-frame" src="" frameborder="0" sandbox="allow-scripts allow-same-origin"></iframe>
        <div id="game-controls" role="group" aria-label="Game controls">
            <button id="open-new-tab-btn" type="button">Open in new tab</button>
            <button id="fullscreen-btn" type="button">Fullscreen</button>
            <button id="back-btn" type="button">Back to game selection</button>
        </div>
    </div>

<nav class="bottom-nav" role="navigation" aria-label="Bottom navigation">
    <a href="index.html" class="nav-item" id="home-link">Home</a>
    <a href="#" class="nav-item" id="settings-link">Settings</a>
    <a href="#" class="nav-item" id="menu-link">Menu</a>
</nav>

    <script>
        const gameList = document.getElementById('game-list');
        const gameViewer = document.getElementById('game-viewer-container');
        const gameFrame = document.getElementById('game-frame');
        const openNewTabBtn = document.getElementById('open-new-tab-btn');
        const fullscreenBtn = document.getElementById('fullscreen-btn');
        const backBtn = document.getElementById('back-btn');
        let currentUrl = '';
        

        // Show game viewer and load iframe with selected game URL
        gameList.addEventListener('click', e => {
            const btn = e.target.closest('button[data-url]');
            if (!btn) return;
            currentUrl = btn.dataset.url;
            gameFrame.src = currentUrl;
            gameList.style.display = 'none';
            gameViewer.style.display = 'block';
        });

        // Open game in new tab
        openNewTabBtn.addEventListener('click', () => {
            if(currentUrl) {
                window.open(currentUrl, 'about:blank');
            }
        });

        // Fullscreen the iframe
fullscreenBtn.addEventListener('click', () => {
    if (gameFrame.requestFullscreen) {
        gameFrame.requestFullscreen();
    } else if (gameFrame.webkitRequestFullscreen) { // Safari
        gameFrame.webkitRequestFullscreen();
    } else if (gameFrame.msRequestFullscreen) { // IE11
        gameFrame.msRequestFullscreen();
    }
});

        // Back to game selection
        backBtn.addEventListener('click', () => {
            gameFrame.src = '';
            gameViewer.style.display = 'none';
            gameList.style.display = 'flex';
            gameList.style.flexWrap = 'wrap';
            gameList.style.justifyContent = 'center';
        });

        // Bottom nav handlers
        document.getElementById('settings-link').addEventListener('click', e => {
            e.preventDefault();
            alert('Settings are only configurable on home page');
        });

        document.getElementById('menu-link').addEventListener('click', e => {
            e.preventDefault();
            alert('Menu only available on home page');
        });

        // Load appearance settings from localStorage just like index.html
        function loadAppearanceSettings() {
            const savedFont = localStorage.getItem('userFont');
            const savedFontSize = localStorage.getItem('userFontSize');
            const savedTextColor = localStorage.getItem('userTextColor');
            const savedBackgroundImage = localStorage.getItem('userBackgroundImage');
            const savedBackgroundColor = localStorage.getItem('userBackgroundColor');
            const body = document.body;

            if (savedFont) {
                body.style.fontFamily = savedFont;
            }
            if (savedFontSize) {
                body.style.fontSize = savedFontSize;
            } else {
                body.style.fontSize = "16px";
            }
            if (savedTextColor) {
                body.style.color = savedTextColor;
            } else {
                body.style.color = "#fff";
            }
            if (savedBackgroundImage) {
                body.style.backgroundImage = `url('${savedBackgroundImage}')`;
                body.classList.add('background-image-mode');
                body.style.backgroundColor = '';
            } else if (savedBackgroundColor) {
                body.style.backgroundImage = '';
                body.classList.remove('background-image-mode');
                body.style.backgroundColor = savedBackgroundColor;
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            loadAppearanceSettings();
            // Adjust game list display style for flex wrap after load
            gameList.style.display = 'flex';
            gameList.style.flexWrap = 'wrap';
            gameList.style.justifyContent = 'center';
        });
    </script>
</body>
</html>
