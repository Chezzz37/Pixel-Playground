<!DOCTYPE html>
<html lang="en" >
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Game Site Template - Games</title>
     <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <link href="https://fonts.googleapis.com/css2?family=Audiowide&family=Black+Ops+One&family=Bungee&family=Bubblegum+Sans&family=Fredoka+One&family=Nosifer&display=swap" rel="stylesheet" />
    <style>
        @font-face {
            font-family: 'Pixelify Sans';
            src: url('https://files.florian-rappl.de/pixelify/Pixellari.ttf') format('truetype');
            font-weight: normal;
            font-style: normal;
        }
        body {
            font-family: 'Bungee', sans-serif;
            background-color: #000;
            color: #fff;
            margin: 0;
            padding-bottom: 60px;
            text-align: center;
            transition: color 0.3s, background-color 0.3s;
        }
        body.background-image-mode {
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            background-color: #000;
        }
        /* Container for buttons */
        #game-buttons {
            margin: 20px auto;
            max-width: 600px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            align-items: center;
        }
        #game-buttons button {
            background-color: #FFA500;
            border: 2px solid #FFA500;
            border-radius: 6px;
            color: #000;
            cursor: pointer;
            font-family: inherit;
            font-size: 1.1rem;
            padding: 12px 20px;
            width: 280px;
            user-select: none;
            transition: background-color 0.3s, color 0.3s;
        }
        #game-buttons button:hover {
            background-color: #000;
            color: #FFA500;
            border-color: #FFA500;
        }

        #game-viewer-container {
            margin-top: 20px;
        }
        #game-frame {
            width: 939px;
            height: 459px;
            border: 3px solid #FFA500;
            border-radius: 8px;
            background-color: #000;
            display: none;
            margin: 0 auto;
        }
        /* Controls below the large game iframe */
        #game-controls {
            margin-top: 10px;
            display: none;
            justify-content: center;
            gap: 12px;
        }
        #game-controls button {
            padding: 10px 16px;
            border: 2px solid #FFA500;
            background-color: #FFA500;
            color: #000;
            cursor: pointer;
            border-radius: 6px;
            font-family: inherit;
            font-size: 1rem;
            user-select: none;
            transition: background-color 0.3s, color 0.3s;
            min-width: 130px;
        }
        #game-controls button:hover {
            background-color: #000;
            color: #FFA500;
            border-color: #FFA500;
        }
        /* Bottom nav bar */
        .bottom-nav {
            background-color: #000;
            position: fixed;
            bottom: 0;
            width: 100%;
            display: flex;
            justify-content: space-around;
            box-shadow: 0 -2px 10px rgba(255, 165, 0, 0.5);
            z-index: 1000;
        }
        .nav-item {
            padding: 14px;
            color: #FFA500;
            text-decoration: none;
            cursor: pointer;
            user-select: none;
            font-family: 'Bungee', sans-serif;
            font-size: 1.1rem;
        }
        .nav-item:hover {
            background-color: #FFA500;
            color: #000;
        }
    </style>
</head>
<body>
    <h1 style="color:#fff; user-select:none; margin-top:20px;">Game Selection</h1>

    <!-- Buttons for games -->
    <div id="game-buttons" aria-label="Game selection buttons"></div>

    <div id="game-viewer-container" aria-label="Selected game viewer">
        <iframe id="game-frame" src="" frameborder="0" sandbox="allow-scripts allow-same-origin" title="Selected game"></iframe>
        <div id="game-controls" role="group" aria-label="Game controls">
            <button id="open-new-tab-btn" type="button">Open in new tab</button>
            <button id="fullscreen-btn" type="button">Fullscreen</button>
            <button id="back-btn" type="button">Back to game selection</button>
        </div>
    </div>

<nav class="bottom-nav" role="navigation" aria-label="Bottom navigation">
    <a href="index.html" class="nav-item" id="home-link">Home</a>
    <a href="#" class="nav-item" id="settings-link">Settings</a>
    <a href="#" class="nav-item" id="menu-link">Menu</a>
</nav>

<script>
    // 1. Base URL for raw content
    const rawBaseUrl = 'https://raw.githubusercontent.com/USERNAME/REPO/BRANCH/';

    // 2. List of game index files
    const gameFiles = [
      'game1/index.html',
      'game2/index.html',
      'folder/game3.js'
    ];

    // 3. Load games (e.g., in an iframe)
    gameFiles.forEach(gamePath => {
      const fullRawUrl = rawBaseUrl + gamePath;
      console.log('Loading game from:', fullRawUrl);
      
      // Example: Setting an iframe source to the raw content
      // document.getElementById('game-frame').src = fullRawUrl;
    });

    // Dummy game buttons using friendly names mapped to paths in gameFiles for iframe loading
    const games = [
        { path: rawBaseUrl + 'game1/index.html', name: 'Game 1' },
        { path: rawBaseUrl + 'game2/index.html', name: 'Game 2' },
        { path: rawBaseUrl + 'folder/game3.js', name: 'Game 3 (JS)' }
    ];

    const buttonsContainer = document.getElementById('game-buttons');
    const gameFrame = document.getElementById('game-frame');
    const gameControls = document.getElementById('game-controls');
    const openNewTabBtn = document.getElementById('open-new-tab-btn');
    const fullscreenBtn = document.getElementById('fullscreen-btn');
    const backBtn = document.getElementById('back-btn');

    let currentUrl = '';

    // Create game buttons for iframe loading
    function createGameButtons() {
        buttonsContainer.innerHTML = ""; // clear existing
        games.forEach(({ path, name }) => {
            const btn = document.createElement('button');
            btn.textContent = name;
            btn.type = "button";
            btn.addEventListener('click', () => {
                currentUrl = path;
                gameFrame.src = currentUrl;
                gameFrame.style.display = "block";
                gameControls.style.display = "flex";
                buttonsContainer.style.display = "none";
            });
            buttonsContainer.appendChild(btn);
        });
    }

    openNewTabBtn.addEventListener('click', () => {
        if (currentUrl) window.open(currentUrl, '_blank');
    });
    fullscreenBtn.addEventListener('click', () => {
        if (gameFrame.requestFullscreen) {
            gameFrame.requestFullscreen();
        } else if (gameFrame.webkitRequestFullscreen) {
            gameFrame.webkitRequestFullscreen();
        } else if (gameFrame.msRequestFullscreen) {
            gameFrame.msRequestFullscreen();
        }
    });
    backBtn.addEventListener('click', () => {
        gameFrame.src = '';
        gameFrame.style.display = "none";
        gameControls.style.display = "none";
        buttonsContainer.style.display = "flex";
    });

    // Bottom nav handlers
    document.getElementById('settings-link').addEventListener('click', e => {
        e.preventDefault();
        alert('Settings are only configurable on home page');
    });
    document.getElementById('menu-link').addEventListener('click', e => {
        e.preventDefault();
        alert('Menu only available on home page');
    });

    // Load appearance settings from localStorage
    function loadAppearanceSettings() {
        const savedFont = localStorage.getItem('userFont');
        const savedFontSize = localStorage.getItem('userFontSize');
        const savedTextColor = localStorage.getItem('userTextColor');
        const savedBackgroundImage = localStorage.getItem('userBackgroundImage');
        const savedBackgroundColor = localStorage.getItem('userBackgroundColor');
        const body = document.body;

        if (savedFont) body.style.fontFamily = savedFont;
        if (savedFontSize) body.style.fontSize = savedFontSize;
        else body.style.fontSize = "16px";
        if (savedTextColor) body.style.color = savedTextColor;
        else body.style.color = "#fff";
        if (savedBackgroundImage) {
            body.style.backgroundImage = `url('${savedBackgroundImage}')`;
            body.classList.add('background-image-mode');
            body.style.backgroundColor = '';
        } else if (savedBackgroundColor) {
            body.style.backgroundImage = '';
            body.classList.remove('background-image-mode');
            body.style.backgroundColor = savedBackgroundColor;
        }
    }

    document.addEventListener('DOMContentLoaded', () => {
        loadAppearanceSettings();
        createGameButtons();
    });
</script>
</body>
</html>
